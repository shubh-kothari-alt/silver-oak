<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Experience | The Silver Oak</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --gold: #C6A87C; 
            --white: #F0F0F0; 
            --grey: #a0a0a0;
            --glass-card: rgba(10, 10, 10, 0.7);
            --font-head: 'Cinzel', serif; 
            --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- 2. BACKGROUND IMAGE --- */
        body {
            font-family: var(--font-body); color: var(--white);
            height: 100vh; width: 100%; overflow: hidden; position: relative;
            background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=2070&auto=format&fit=crop');
            background-position: center; background-size: cover; background-repeat: no-repeat;
        }
        /* Dark Overlay */
        body::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.55); z-index: -1; backdrop-filter: blur(2px); 
        }

        /* --- 3. NAVBAR --- */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
        }
        .logo { 
            font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 2px; 
            color: var(--white); text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
        }
        .back-link { 
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; 
            color: var(--white); text-decoration: none; opacity: 0.9; transition: 0.3s; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }
        .back-link:hover { opacity: 1; color: var(--gold); }

        /* --- 4. CENTERED CARD --- */
        .wrapper { 
            height: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; 
        }
        .glass-card {
            width: 100%; max-width: 500px; background: var(--glass-card);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(198, 168, 124, 0.4);
            padding: 2.5rem 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border-radius: 2px;
            animation: floatUp 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(20px);
        }

        .header-text { text-align: center; margin-bottom: 2rem; }
        .header-text h1 { font-family: var(--font-head); color: var(--gold); font-size: 2rem; margin-bottom: 0.5rem; }
        .header-text p { font-size: 0.85rem; color: var(--grey); letter-spacing: 1px; }

        /* --- 5. FORM ELEMENTS --- */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .input-wrap { position: relative; }
        
        label { 
            display: block; font-size: 0.7rem; text-transform: uppercase; 
            letter-spacing: 1.5px; color: var(--gold); margin-bottom: 5px; 
        }
        input, select, textarea {
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 0; font-family: var(--font-body); 
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            border-bottom-color: var(--gold); 
            background: linear-gradient(to bottom, transparent 95%, rgba(198, 168, 124, 0.1) 100%); 
        }
        
        /* Custom Select Arrow */
        select { 
            cursor: pointer; appearance: none; 
            background: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C6A87C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") no-repeat right center; 
            background-size: 15px; 
        }
        select option { background: #0f0f0f; color: #fff; padding: 12px; }
        
        /* Date Picker Icon */
        input[type="date"]::-webkit-calendar-picker-indicator { 
            filter: invert(1); opacity: 0.6; cursor: pointer; 
        }

        /* --- 6. BUTTONS --- */
        .btn-reserve {
            width: 100%; padding: 1rem; margin-top: 1.5rem; background: var(--gold); color: #0f0f0f;
            border: none; font-family: var(--font-head); font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-reserve:hover { 
            background: #d4b88c; box-shadow: 0 0 15px rgba(198, 168, 124, 0.4); 
        }

        /* --- 7. UTILITIES & SUCCESS VIEW --- */
        .success-view { display: none; text-align: center; padding: 2rem 0; }
        .success-view i { font-size: 3rem; color: var(--gold); margin-bottom: 1rem; }
        .error-msg { font-size: 0.7rem; color: #ff6b6b; margin-top: 5px; display: none; }

        @keyframes floatUp { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; gap: 1rem; }
            .glass-card { padding: 2rem; margin-top: 60px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SILVER OAK</div>
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> Home</a>
    </nav>

    <div class="wrapper">
        <div class="glass-card">
            
            <div id="formView">
                <div class="header-text">
                    <h1>Make a Reservation</h1>
                    <p>Secure your evening or your stay.</p>
                </div>

                <form id="reservationForm">
                    <div class="input-wrap" style="margin-bottom: 1.5rem;">
                        <label>Service Type</label>
                        <select id="serviceType" required>
                            <option value="Table Reservation">Dining / Table Reservation</option>
                            <option value="Room Booking">Hotel Stay / Room Booking</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="input-wrap">
                            <label>Name</label>
                            <input type="text" id="custName" placeholder="Full Name" required>
                        </div>
                        <div class="input-wrap">
                            <label>Phone</label>
                            <input type="number" id="custPhone" placeholder="10 Digits" required>
                            <span class="error-msg" id="phoneError">Must be 10 digits</span>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-wrap">
                            <label>Date</label>
                            <input type="date" id="dateInput" required>
                        </div>
                        <div class="input-wrap">
                            <label>Time / Check-in</label>
                            <select required>
                                <option>12:00 PM</option>
                                <option>1:00 PM</option>
                                <option selected>7:00 PM</option>
                                <option>8:00 PM</option>
                                <option>9:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-wrap">
                            <label>Guests</label>
                            <select required>
                                <option>2 Guests</option>
                                <option>3 Guests</option>
                                <option>4 Guests</option>
                                <option>5+ Guests</option>
                            </select>
                        </div>
                        <div class="input-wrap">
                            <label>Preference</label>
                            <select>
                                <option>Indoor Lounge</option>
                                <option>Garden Terrace</option>
                                <option>Private Booth</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-wrap" style="margin-top: 20px;">
                        <label>Special Requests</label>
                        <textarea rows="1" placeholder="Allergies, Anniversary..."></textarea>
                    </div>

                    <button type="submit" class="btn-reserve">Confirm & Pay Deposit</button>
                    <p style="text-align: center; font-size: 0.6rem; margin-top: 10px; color: #888;">* ₹500 Booking Deposit applies</p>
                </form>
            </div>

            <div id="successView" class="success-view">
                <i class="fas fa-check-circle"></i>
                <h2 style="font-family: var(--font-head); color: var(--gold); margin-bottom: 10px;">Booking Confirmed</h2>
                <p style="color: var(--white); opacity: 0.8; line-height: 1.6;">
                    Payment ID: <span id="payId" style="color:var(--gold)"></span><br>
                    A confirmation has been sent to your phone.
                </p>
                <br>
                <a href="index.html" class="btn-reserve" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem;">Return to Home</a>
            </div>

        </div>
    </div>

    <script>
        // 1. DATE VALIDATION (Block Past Dates)
        const dateInput = document.getElementById('dateInput');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        // 2. FORM HANDLER (SIMULATED PAYMENT)
        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const phone = document.getElementById('custPhone').value;
            const phoneError = document.getElementById('phoneError');
            const btn = document.querySelector('.btn-reserve');
            
            // Validation: Phone must be 10 digits
            if(phone.length !== 10) {
                phoneError.style.display = 'block';
                return;
            } else {
                phoneError.style.display = 'none';
            }

            // SIMULATE PAYMENT CONNECTION
            const originalText = btn.innerText;
            btn.innerText = "Connecting to Gateway...";
            btn.style.opacity = "0.7";
            btn.style.cursor = "not-allowed";

            // Wait 1.5 seconds to mimic network delay
            setTimeout(() => {
                
                // SHOW THE DEMO MESSAGE
                alert("NOTE: For the real website, this will redirect to the Razorpay Payment Gateway.\n\nSimulating a successful transaction now...");

                // TRIGGER SUCCESS SCREEN
                // We pass a fake payment ID to look authentic
                showSuccess("pay_test_839204"); 
                
                // Reset button state (optional)
                btn.innerText = originalText;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";

            }, 1500);
        });

        // 3. SUCCESS ANIMATION FUNCTION
        function showSuccess(paymentId) {
            const formView = document.getElementById('formView');
            const successView = document.getElementById('successView');
            document.getElementById('payId').innerText = paymentId;

            // Fade out the form
            formView.style.opacity = '0';
            formView.style.transition = 'opacity 0.5s ease';

            setTimeout(() => {
                formView.style.display = 'none';
                successView.style.display = 'block';
                
                // Fade in the success message
                requestAnimationFrame(() => {
                    successView.style.opacity = '0';
                    successView.style.transform = 'translateY(10px)';
                    successView.style.transition = 'all 0.6s ease';
                    
                    requestAnimationFrame(() => {
                        successView.style.opacity = '1';
                        successView.style.transform = 'translateY(0)';
                    });
                });
            }, 500);
        }
    </script>
</body>
</html>
